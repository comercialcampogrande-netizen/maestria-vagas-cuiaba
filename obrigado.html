<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidatura Recebida – Maestria Global Business</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080C14;
    color: #F8F6F1;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(201,168,76,0.1) 0%, transparent 70%), #080C14;
  }
  .card {
    max-width: 540px;
  }
  .icon {
    font-size: 52px;
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 700;
    color: #C9A84C;
    margin-bottom: 16px;
  }
  p {
    font-size: 17px;
    font-weight: 300;
    color: rgba(248,246,241,0.72);
    line-height: 1.75;
    margin-bottom: 12px;
  }
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin: 32px 0;
  }
  .note {
    font-size: 13px;
    color: #8A8F9E;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✦</div>
    <h1>Candidatura recebida.</h1>
    <p>Obrigado por se inscrever para o <strong>Maestria Global Business</strong>.</p>
    <p>Nossa equipe vai analisar seu perfil e entrar em contato via <strong>WhatsApp em até 48 horas</strong>.</p>
    <div class="divider"></div>
    <p class="note">Apenas candidatos qualificados serão contactados.<br>Vagas limitadas — um empresário por segmento.</p>
  </div>
</body>
</html>
